global
    log stdout format raw local0

defaults
    log     global
    mode    http
    option  httplog
    timeout connect 5s
    timeout client  30s
    timeout server  30s

frontend fe
    bind *:80
    # Comportamento legacy — repassa Transfer-Encoding sem validar conflito com Content-Length
    option http-keep-alive
    default_backend be

backend be
    server s1 smuggle-back:8081
